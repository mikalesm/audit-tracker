name: Deploy to Azure App Service

# Federated-identity (OIDC) login. Required GitHub repo secrets:
#   AZURE_CLIENT_ID      — App registration ID with Federated Identity Credential
#                           bound to repo:<owner>/<repo>:ref:refs/heads/main
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
# Required GitHub repo variables (per engagement — duplicate the workflow if
# you need to deploy to multiple App Services from the same repo):
#   AZURE_WEBAPP_NAME           e.g. app-audit-acme
#   AZURE_RESOURCE_GROUP        e.g. rg-audit-acme-prod
#   GHCR_OWNER                  GitHub user/org that owns the container image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Container tag to deploy (defaults to commit SHA)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # OIDC for Azure login
  contents: read
  packages: write   # publish to ghcr.io

# Opt every JavaScript-based action into the Node.js 24 runtime ahead of the
# 2026-06-02 forced migration. GitHub-owned actions are already pinned to v5;
# this flag covers docker/* and azure/login until they ship Node 24 majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-${{ vars.AZURE_WEBAPP_NAME }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          IMAGE="ghcr.io/${{ vars.GHCR_OWNER || github.repository_owner }}/audit-tracker:${TAG}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service container image
        run: |
          az webapp config container set \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ needs.build-and-push.outputs.image }}" \
            --container-registry-url "https://ghcr.io"

      - name: Restart app
        run: |
          az webapp restart \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"

      - name: Smoke /api/healthz
        run: |
          URL="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/healthz"
          for i in {1..40}; do
            BODY=$(curl -fsS "$URL" || true)
            if echo "$BODY" | grep -q '"ok":true'; then
              echo "OK: $BODY"
              exit 0
            fi
            echo "waiting…"
            sleep 5
          done
          echo "healthz never returned ok"
          exit 1
