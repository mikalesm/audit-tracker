name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Check template library is in sync with the workbook
        run: npm run check:library

      - name: Build (Next standalone)
        run: npm run build

      - name: Run migrations against pglite (smoke)
        run: npm run migrate

      - name: Build Docker image
        run: docker build -t audit-tracker:ci .

      - name: Smoke-test Docker image
        run: |
          set -x
          docker run -d --name app -p 3000:3000 \
            -e AUTH_DEV_BYPASS=1 \
            -e NEXTAUTH_SECRET=ci-only-secret \
            -e NEXTAUTH_URL=http://localhost:3000 \
            -e AUTH_TRUST_HOST=true \
            audit-tracker:ci
          # Give the container a moment to actually start the process before polling.
          sleep 5
          docker ps -a
          ok=0
          for i in $(seq 1 60); do
            if curl -fs http://localhost:3000/api/healthz; then echo; echo "OK on attempt $i"; ok=1; break; fi
            sleep 2
          done
          echo "--- container status ---"
          docker ps -a
          echo "--- container logs ---"
          docker logs app || true
          if [ "$ok" != "1" ]; then
            echo "healthz never responded (waited 120s)"
            exit 1
          fi

  e2e:
    # Non-blocking: the suite will be rewritten in Phase C for multi-tenant
    # scenarios (engagement create / switch / cross-engagement isolation), and
    # the current single-tenant selectors will be obsolete. Keep the job
    # informational rather than gating until then.
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      # Playwright lives outside package.json so the lockfile stays untouched
      # (the main build job's `npm ci` requires strict integrity).
      - run: npm install --no-save @playwright/test@^1.49.0

      - run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm run test:e2e
        env:
          AUTH_DEV_BYPASS: '1'
          NEXTAUTH_SECRET: 'e2e-only-secret'
          AUDITOR_LEAD_BOOTSTRAP_EMAILS: 'lead@example.test'

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results
            playwright-report
          retention-days: 7
