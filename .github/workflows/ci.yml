name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Opt every JavaScript-based action into the Node.js 24 runtime ahead of the
# 2026-06-02 forced migration. GitHub-owned actions below are already pinned to
# v5 (Node 24 by default); this flag covers third-party actions (docker/*,
# azure/login, etc.) until they ship Node 24 majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Check template library is in sync with the workbook
        run: npm run check:library

      - name: Build (Next standalone)
        run: npm run build

      - name: Run migrations against pglite (smoke)
        run: npm run migrate

      - name: Build Docker image
        run: docker build -t audit-tracker:ci .

      - name: Smoke-test Docker image
        run: |
          set -x
          docker run -d --name app -p 3000:3000 \
            -e AUTH_DEV_BYPASS=1 \
            -e NEXTAUTH_SECRET=ci-only-secret \
            -e NEXTAUTH_URL=http://localhost:3000 \
            -e AUTH_TRUST_HOST=true \
            audit-tracker:ci
          # Give the container a moment to actually start the process before polling.
          sleep 5
          docker ps -a
          ok=0
          for i in $(seq 1 60); do
            if curl -fs http://localhost:3000/api/healthz; then echo; echo "OK on attempt $i"; ok=1; break; fi
            sleep 2
          done
          echo "--- container status ---"
          docker ps -a
          echo "--- container logs ---"
          docker logs app || true
          if [ "$ok" != "1" ]; then
            echo "healthz never responded (waited 120s)"
            exit 1
          fi

  rls-isolation:
    # Blocking: verifies Row-Level Security actually enforces engagement
    # isolation. Must run against a real Postgres — pglite (used by the build
    # job's smoke test) silently ignores RLS. Migrations run as a NON-superuser
    # role that owns the tables, mirroring prod where the app's Managed Identity
    # owns them and FORCE ROW LEVEL SECURITY applies to it.
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: audit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Provision non-superuser app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d audit_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE app_rls LOGIN PASSWORD 'app_rls_pw' NOSUPERUSER NOBYPASSRLS;
          GRANT ALL ON SCHEMA public TO app_rls;
          SQL

      - name: Run migrations as the app role (owns the tables, like prod)
        env:
          DATABASE_URL: postgres://app_rls:app_rls_pw@localhost:5432/audit_test
        run: npm run migrate

      - name: RLS isolation assertions
        env:
          DATABASE_URL: postgres://app_rls:app_rls_pw@localhost:5432/audit_test
        run: npm run test:rls

  e2e:
    # Non-blocking: the suite will be rewritten in Phase C for multi-tenant
    # scenarios (engagement create / switch / cross-engagement isolation), and
    # the current single-tenant selectors will be obsolete. Keep the job
    # informational rather than gating until then.
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      # Playwright lives outside package.json so the lockfile stays untouched
      # (the main build job's `npm ci` requires strict integrity).
      - run: npm install --no-save @playwright/test@^1.49.0

      - run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm run test:e2e
        env:
          AUTH_DEV_BYPASS: '1'
          NEXTAUTH_SECRET: 'e2e-only-secret'
          AUDITOR_LEAD_BOOTSTRAP_EMAILS: 'lead@example.test'

      - if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-traces
          path: |
            test-results
            playwright-report
          retention-days: 7
